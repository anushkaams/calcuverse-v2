<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B8BFA"/>
      <stop offset="100%" stop-color="#6456E0"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cec8ff"/>
    </linearGradient>
    <filter id="s" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3d2faa" flood-opacity="0.4"/>
    </filter>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="76" height="76" rx="20" fill="url(#bg)" filter="url(#s)"/>

  <!-- Shine top-left -->
  <ellipse cx="22" cy="18" rx="22" ry="12" fill="#ffffff" fill-opacity="0.12" transform="rotate(-20 22 18)"/>

  <!-- Border -->
  <rect x="2" y="2" width="76" height="76" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Corner dots -->
  <circle cx="18" cy="18" r="2.5" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="62" cy="18" r="2.5" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="18" cy="62" r="2.5" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="62" cy="62" r="2.5" fill="#ffffff" fill-opacity="0.25"/>

  <!-- Sigma -->
  <text
    x="40" y="57"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="700"
    text-anchor="middle"
    fill="url(#sg)"
    filter="url(#g)"
  >∑</text>
</svg>
