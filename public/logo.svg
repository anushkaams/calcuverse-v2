<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7AF8"/>
      <stop offset="100%" stop-color="#6B58E8"/>
    </linearGradient>
    <linearGradient id="sigma-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4ccff"/>
    </linearGradient>
    <linearGradient id="dot-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
    <filter id="icon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4c3bbf" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon background rounded square -->
  <rect x="4" y="8" width="64" height="64" rx="16" fill="url(#bg-grad)" filter="url(#icon-shadow)"/>

  <!-- Inner subtle grid lines on icon -->
  <rect x="4" y="8" width="64" height="64" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Decorative small dots on icon corners -->
  <circle cx="18" cy="22" r="2" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="54" cy="22" r="2" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="18" cy="58" r="2" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="54" cy="58" r="2" fill="#ffffff" fill-opacity="0.2"/>

  <!-- Sigma symbol ∑ -->
  <text
    x="36" y="50"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34"
    font-weight="700"
    text-anchor="middle"
    fill="url(#sigma-grad)"
    filter="url(#glow)"
  >∑</text>

  <!-- Wordmark: "Calco" in light weight + "smos" accent -->
  <text
    x="84" y="43"
    font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="300"
    letter-spacing="-0.5"
    fill="#f0f0f5"
  >Calco</text>

  <text
    x="151" y="43"
    font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="600"
    letter-spacing="-0.5"
    fill="url(#dot-grad)"
  >smos</text>

  <!-- Subtle tagline -->
  <text
    x="85" y="58"
    font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="2.5"
    fill="#6b6b88"
  >COSMIC MATH</text>
</svg>
